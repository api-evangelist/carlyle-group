name: The Carlyle Group
description: >-
  The Carlyle Group (NASDAQ: CG) is a global investment firm that
  deploys private capital across Global Private Equity, Global
  Credit, Global Investment Solutions (AlpInvest), and carveouts
  such as Carlyle Direct Lending. Carlyle does not publish a public
  developer API. Institutional LPs, co-investors, and portfolio
  companies interact with the firm through a set of private,
  authentication-gated portals: LP Connect for fund investors,
  Carlyle Direct Lending's portal for direct lending clients,
  the Carlyle Global Portfolio Solutions (resources.carlyle.com)
  portal, and brand experiences such as Carlyle & Co. Integrations
  with fund administrators, custodians, and placement agents run
  through bespoke secure file exchange and vendor-managed APIs.
